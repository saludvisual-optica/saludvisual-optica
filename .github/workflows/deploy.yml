name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        run: |
          sed -i "s|%%SCRIPT_URL%%|${{ secrets.SCRIPT_URL }}|g" index.html
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            sed -i "s|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g" index.html
          fi
          if [ -n "${{ secrets.GROQ_API_KEY }}" ]; then
            sed -i "s|%%GROQ_API_KEY%%|${{ secrets.GROQ_API_KEY }}|g" index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
