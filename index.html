<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a7a4a">
<title>Salud Visual – Orden de Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#1a7a4a;--g2:#2d9e62;--g3:#e8f5ee;--g4:#f0fbf5;
  --dk:#111827;--md:#374151;--mu:#6b7280;--bd:#d1d5db;
  --bg:#f9fafb;--wh:#ffffff;--rd:#dc2626;--am:#d97706;
  --nav-h:56px;--tab-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dk);
  display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}

/* ── TOP NAV ── */
.nav{background:var(--g1);color:#fff;display:flex;align-items:center;
  justify-content:space-between;padding:0 16px;
  height:var(--nav-h);flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;
  padding-top:env(safe-area-inset-top);}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;}
.sync-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);
  border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;}
.sync-dot{width:8px;height:8px;border-radius:50%;}
.sync-dot.ok{background:#4ade80;}
.sync-dot.busy{background:#fbbf24;animation:blink .7s infinite;}
.sync-dot.err{background:#f87171;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.nav-dtabs{display:none;gap:4px;}
.nav-dt{padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11px;
  font-weight:600;color:rgba(255,255,255,.7);border:none;background:transparent;}
.nav-dt.active,.nav-dt:hover{background:rgba(255,255,255,.2);color:#fff;}

/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 16px);}

/* ── BOTTOM TAB BAR ── */
.tab-bar{background:var(--wh);border-top:1px solid var(--bd);
  display:flex;position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);z-index:100;
  padding-bottom:env(safe-area-inset-bottom);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;cursor:pointer;color:var(--mu);transition:color .15s;
  font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;padding:6px 0;
  letter-spacing:.3px;text-transform:uppercase;}
.tab-btn.active{color:var(--g1);}
.tab-btn svg{width:20px;height:20px;stroke-width:2;}

/* ── SCREENS ── */
.screen{display:none;padding:16px;}
.screen.active{display:block;}
.screen-max{max-width:700px;margin:0 auto;}

.queue-bar{background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;
  padding:10px 14px;margin-bottom:12px;display:none;
  align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:#92400e;}
.queue-bar.show{display:flex;}

/* ── FORM HEADER ── */
.form-header{background:var(--g1);color:#fff;border-radius:12px 12px 0 0;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.form-header h1{font-size:17px;font-weight:700;}
.folio-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  border-radius:7px;padding:4px 10px;font-family:'DM Mono',monospace;font-size:11px;}

/* ── FORM CARD ── */
.form-card{background:var(--wh);border-radius:0 0 12px 12px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);padding:16px;}
.sec{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--g2);border-bottom:2px solid var(--g3);padding-bottom:5px;
  margin:16px 0 10px;}
.sec:first-child{margin-top:0;}
.grid{display:grid;gap:10px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:10px;font-weight:700;color:var(--mu);
  letter-spacing:.4px;text-transform:uppercase;}
.fld input,.fld select{border:1.5px solid var(--bd);border-radius:9px;
  padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:16px;
  color:var(--dk);background:var(--wh);height:46px;width:100%;}

/* ── RX TABLE ── */
.rx-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;}
.rx-table{width:100%;border-collapse:collapse;min-width:400px;}
.rx-table th{background:var(--g3);color:var(--g1);font-size:10px;font-weight:700;
  text-align:center;padding:8px 4px;border:1px solid #c3e6d4;}
.rx-table td{border:1px solid var(--bd);padding:2px 3px;}
.eye{background:var(--g1);color:#fff;font-weight:700;font-size:11px;
  text-align:center;width:32px;}
.rx-table input{width:100%;border:none;text-align:center;
  font-family:'DM Mono',monospace;font-size:14px;
  padding:8px 2px;background:transparent;color:var(--dk);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:10px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;
  min-height:42px;}
.btn-primary{background:var(--g1);color:#fff;}
.btn-sec{background:var(--g3);color:var(--g1);border:1.5px solid #c3e6d4;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;
  margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);flex-wrap:wrap;}

/* ── EXTRACTOR SPECIFIC ── */
.ext-upload-zone{border:2px dashed var(--g2);border-radius:14px;background:var(--g4);
  padding:32px 16px;text-align:center;margin-bottom:14px;position:relative;}
.ext-upload-icon{font-size:40px;margin-bottom:10px;}
.ext-preview-wrap{display:none;position:relative;margin-bottom:14px;border-radius:12px;
  overflow:hidden;border:1.5px solid var(--bd);}
.ext-preview-wrap.show{display:block;}
.ext-preview-img{width:100%;max-height:280px;object-fit:contain;display:block;background:#000;}

@media(min-width:1024px){
  .nav-dtabs{display:flex!important;}
  .tab-bar{display:none;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M2 12c2.5-5 5.5-8 10-8s7.5 3 10 8c-2.5 5-5.5 8-10 8s-7.5-3-10-8Z"/></svg>
    <span>SALUD VISUAL</span>
  </div>
  <div class="nav-dtabs">
    <button class="nav-dt" onclick="showScreen('nueva')">NUEVA</button>
    <button class="nav-dt" onclick="showScreen('historial')">HISTORIAL</button>
    <button class="nav-dt active" onclick="showScreen('extractor')">SCANNER IA</button>
  </div>
  <div class="sync-chip" id="sync-chip">
    <div class="sync-dot ok"></div>
    <span id="sync-lbl">Conectado</span>
  </div>
</nav>

<main class="scroll-area">
  
  <section id="screen-nueva" class="screen screen-max">
    <div class="form-header">
      <h1>Nueva Orden</h1>
      <div class="folio-badge">FOLIO #--</div>
    </div>
    <div class="form-card">
      <div class="sec">Datos del Cliente</div>
      <div class="grid g2">
        <div class="fld"><label>Nombre</label><input type="text" placeholder="Nombre completo"></div>
        <div class="fld"><label>Teléfono</label><input type="tel" placeholder="81..."></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary">Guardar en Sheets</button>
      </div>
    </div>
  </section>

  <section id="screen-extractor" class="screen screen-max active">
    
    <div class="ext-upload-zone" id="ext-drop-zone">
      <div class="ext-upload-icon">🔍</div>
      <div class="ext-upload-title" style="font-weight:700; font-size:16px;">Analizar Receta con IA</div>
      <div class="ext-upload-sub" style="font-size:12px; color:var(--mu); margin-bottom:15px;">Sube una foto para extraer los datos automáticamente</div>
      <div style="display:flex; gap:10px; justify-content:center;">
        <label class="btn btn-primary" style="cursor:pointer">
          <input type="file" id="ext-file-input" hidden accept="image/*">
          <span>📷 Tomar Foto</span>
        </label>
      </div>
    </div>

    <div class="ext-preview-wrap" id="ext-prev-wrap">
      <img src="" id="ext-prev-img" class="ext-preview-img">
      <button class="ext-clear-btn" onclick="extClear()">×</button>
    </div>

    <div id="ext-results-area" style="display:none; margin-top:20px;">
      
      <div class="form-header" style="background:var(--g2)">
        <h1>Datos Extraídos por IA</h1>
        <div id="ext-conf-badge" class="folio-badge">Confianza: --%</div>
      </div>

      <div class="form-card">
        
        <div class="sec">Información General</div>
        <div class="grid g2">
          <div class="fld"><label>Nombre</label><input type="text" id="ef-nombre" class="hi"></div>
          <div class="fld"><label>Teléfono</label><input type="text" id="ef-telefono" class="hi"></div>
          <div class="fld s2"><label>Dirección / Colonia</label><input type="text" id="ef-direccion" class="hi"></div>
        </div>

        <div class="sec">Graduación Extraída</div>
        <div class="rx-wrap">
          <table class="rx-table">
            <thead>
              <tr>
                <th style="width:34px"></th>
                <th>ESF</th><th>CYL</th><th>EJE</th><th>ADD</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="eye">OD</td>
                <td><input id="ef-od_esf" class="hi"></td>
                <td><input id="ef-od_cyl" class="hi"></td>
                <td><input id="ef-od_eje" class="hi"></td>
                <td><input id="ef-od_add" class="hi"></td>
              </tr>
              <tr>
                <td class="eye">OI</td>
                <td><input id="ef-oi_esf" class="hi"></td>
                <td><input id="ef-oi_cyl" class="hi"></td>
                <td><input id="ef-oi_eje" class="hi"></td>
                <td><input id="ef-oi_add" class="hi"></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="sec">Especificaciones de Lente</div>
        <div class="grid g3">
          <div class="fld"><label>Visión</label><input type="text" id="ef-tipo_vision" class="hi"></div>
          <div class="fld"><label>Material</label><input type="text" id="ef-material" class="hi"></div>
          <div class="fld"><label>Tratamiento</label><input type="text" id="ef-filtro" class="hi"></div>
        </div>

        <div class="form-actions">
          <button class="btn btn-sec" onclick="extClear()">Descartar</button>
          <button class="btn btn-primary" onclick="extConfirm()">Confirmar y Cargar en Formulario</button>
        </div>
      </div>
    </div>

  </section>

</main>

<nav class="tab-bar">
  <button class="tab-btn" onclick="showScreen('nueva')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
    <span>Nuevo</span>
  </button>
  <button class="tab-btn active" onclick="showScreen('extractor')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7V5a2 2 0 012-2h2m10 0h2a2 2 0 012 2v2m0 10v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/></svg>
    <span>Scanner IA</span>
  </button>
  <button class="tab-btn" onclick="showScreen('historial')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <span>Historial</span>
  </button>
</nav>

<script>
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  
  document.querySelectorAll('.tab-btn, .nav-dt').forEach(b => b.classList.remove('active'));
  // Lógica simple de activación de UI
}

function extClear() {
  document.getElementById('ext-results-area').style.display = 'none';
  document.getElementById('ext-prev-wrap').classList.remove('show');
  document.getElementById('ext-file-input').value = '';
}

// Evento de carga de archivo simulado para mostrar el UI
document.getElementById('ext-file-input').addEventListener('change', function(e) {
  if(e.target.files[0]) {
    const reader = new FileReader();
    reader.onload = function(ex) {
      document.getElementById('ext-prev-img').src = ex.target.result;
      document.getElementById('ext-prev-wrap').classList.add('show');
      // Simulamos que la IA termina de procesar:
      setTimeout(() => {
        document.getElementById('ext-results-area').style.display = 'block';
      }, 1000);
    }
    reader.readAsDataURL(e.target.files[0]);
  }
});
</script>

</body>
</html>
